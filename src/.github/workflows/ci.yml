name: CI

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

env:
  DOTNET_VERSION: '8.0.x'
  SOLUTION_PATH: 'src/MCEControl.sln'
  CONFIGURATION: 'Release'

jobs:
  build-and-test:
    name: Build and Test
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for better blame information
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      
      - name: Display .NET version
        run: dotnet --version
      
      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_PATH }}
      
      - name: Build solution
        run: dotnet build ${{ env.SOLUTION_PATH }} --configuration ${{ env.CONFIGURATION }} --no-restore
      
      - name: Run tests
        run: dotnet test ${{ env.SOLUTION_PATH }} --configuration ${{ env.CONFIGURATION }} --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage" --results-directory ./TestResults
      
      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action/windows@v2
        if: always()
        with:
          files: |
            TestResults/**/*.trx
          check_name: Test Results
          comment_mode: off
      
      - name: Generate code coverage report
        if: always()
        uses: danielpalme/ReportGenerator-GitHub-Action@5.3.11
        with:
          reports: 'TestResults/**/coverage.cobertura.xml'
          targetdir: 'coveragereport'
          reporttypes: 'HtmlInline;Cobertura;MarkdownSummaryGithub'
          verbosity: 'Info'
      
      - name: Add coverage summary to PR
        if: github.event_name == 'pull_request' && always()
        run: |
          if (Test-Path "coveragereport/SummaryGithub.md") {
            Get-Content "coveragereport/SummaryGithub.md" >> $env:GITHUB_STEP_SUMMARY
          }
        shell: pwsh
      
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coveragereport/
          retention-days: 30
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/
          retention-days: 30
      
      - name: Check code coverage threshold
        if: always()
        run: |
          if (Test-Path "coveragereport/Cobertura.xml") {
            [xml]$coverage = Get-Content "coveragereport/Cobertura.xml"
            $lineRate = [double]$coverage.coverage.'line-rate'
            $branchRate = [double]$coverage.coverage.'branch-rate'
            $lineCoverage = [math]::Round($lineRate * 100, 2)
            $branchCoverage = [math]::Round($branchRate * 100, 2)
            
            Write-Host "Line Coverage: $lineCoverage%"
            Write-Host "Branch Coverage: $branchCoverage%"
            
            # Set a reasonable threshold (adjust as needed)
            $threshold = 0
            if ($lineCoverage -lt $threshold) {
              Write-Host "::warning::Line coverage ($lineCoverage%) is below threshold ($threshold%)"
            }
          }
        shell: pwsh
