name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]
  workflow_dispatch:

# Least-privilege token (#163): read-only by default; jobs elevate only what they need.
permissions:
  contents: read

env:
  SOLUTION: 'MCEControl.slnx'
  CONFIGURATION: 'Release'

jobs:
  conflict-markers:
    name: No conflict markers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Scan tracked files for leftover merge conflict markers
        run: |
          # The {7} quantifiers are deliberate: they mean "seven of this char" without the
          # literal 7-char marker ever appearing in this file, so the scan never flags itself.
          if git grep -nE '^(<{7} |={7}$|>{7} |\|{7} )' -- .; then
            echo "::error::Leftover merge conflict markers found (see matches above). Resolve the merge before pushing."
            exit 1
          fi
          echo "No conflict markers found."

  build-and-test:
    name: Build and Test
    runs-on: windows-latest
    permissions:
      contents: read
      checks: write   # EnricoMi/publish-unit-test-result-action creates a check run

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0  # full history for GitVersion

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION }} --configuration ${{ env.CONFIGURATION }} --no-restore

      - name: Test
        run: >
          dotnet test ${{ env.SOLUTION }}
          --configuration ${{ env.CONFIGURATION }}
          --no-build
          --logger "trx;LogFileName=test-results.trx"
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action/windows@d0a4676d0e0b938bc201470d88276b7c74c712b3 # v2.24.0
        if: always()
        with:
          files: TestResults/**/*.trx
          check_name: Test Results
          comment_mode: off

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: TestResults/
          retention-days: 14
