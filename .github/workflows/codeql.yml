name: CodeQL

# Static analysis (code scanning) for the C# codebase. MCEC is Windows-only (WinForms / net10.0-windows),
# so we analyze in build-mode "none" (source-based, no compile) on a Linux runner; this avoids needing a
# Windows build just to scan, and still covers the C# sources.

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]
  schedule:
    - cron: '27 3 * * 1' # weekly, Monday 03:27 UTC

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze C#
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload results to code scanning
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          languages: csharp
          build-mode: none

      - name: Analyze
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          category: "/language:csharp"
